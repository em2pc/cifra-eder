<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Diagrama de Acordes para Guitarra</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(to bottom, #2C1810, #4A2C20);
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            width: 90vw;
            text-align: center;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        select {
            padding: 12px;
            font-size: 16px;
            background: #5D4037;
            color: white;
            border: 2px solid #8B4513;
            border-radius: 5px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background: #8B4513;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        #chord-info {
            margin: 20px 0;
        }
        #chord-info h2 {
            font-size: 2.5em;
            margin: 0;
            color: #FFD700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #chord-info p {
            font-size: 1.2em;
            margin: 5px 0 0;
            color: #DDD;
        }
        #chord-canvas {
            border: 3px solid #8B4513;
            border-radius: 10px;
            display: block;
            max-width: 100%;
            background: #5D4037;
        }
        footer {
            margin-top: 40px;
            font-size: 14px;
            color: #DDD;
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #666;
        }
        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
                align-items: center;
            }
            select, button {
                width: 200px;
            }
            #chord-info h2 {
                font-size: 2em;
            }
        }
    </style>
</head>

    <div class="container">
        <div class="controls">
            <select id="tonalidade">

            </select>

            </select>
            <button id="gerar" disabled>GERAR DIAGRAMA</button>
        </div>
        <div id="chord-info"></div>
        <canvas id="chord-canvas"></canvas>

            {t:"Láb",g:"I",c:"Ab7M",tp:"Maior 7ª",ref:4,c6:99,c5:99,c4:3,c3:2,c2:1,c1:0,d6:0,d5:0,d4:4,d3:3,d2:2,d1:1},
            {t:"Láb",g:"II",c:"Bbm7",tp:"Menor 7ª",ref:1,c6:99,c5:1,c4:3,c3:1,c2:1,c1:99,d6:0,d5:1,d4:3,d3:1,d2:1,d1:0},
            {t:"Láb",g:"III",c:"Cm7",tp:"Menor 7ª",ref:3,c6:99,c5:3,c4:1,c3:3,c2:3,c1:99,d6:0,d5:2,d4:1,d3:3,d2:4,d1:0},
            {t:"Láb",g:"IV",c:"Db7M",tp:"Maior 7ª",ref:4,c6:99,c5:4,c4:3,c3:3,c2:2,c1:99,d6:0,d5:3,d4:2,d3:2,d2:1,d1:0},
            {t:"Láb",g:"V",c:"Eb7",tp:"Dominante 7ª",ref:1,c6:99,c5:99,c4:1,c3:3,c2:2,c1:3,d6:0,d5:0,d4:1,d3:3,d2:2,d1:3},
            {t:"Láb",g:"VI",c:"Fm7",tp:"Menor 7ª",ref:1,c6:1,c5:3,c4:1,c3:1,c2:1,c1:1,d6:1,d5:3,d4:1,d3:1,d2:1,d1:1},
            {t:"Láb",g:"VII",c:"Gm7(b5)",tp:"Meio Diminuto",ref:3,c6:3,c5:99,c4:3,c3:4,c2:4,c1:99,d6:1,d5:0,d4:1,d3:2,d2:3,d1:0}
        ];

        let currentChord = null;
        let canvas, ctx;
        const tonalidades = ["Dó", "Sol", "Ré", "Lá", "Mi", "Si", "Fá#", "Dó#", "Fá", "Sib", "Mib", "Láb"];
        const graus = ["I", "II", "III", "IV", "V", "VI", "VII"];
        const stringLabels = {6: 'E', 5: 'A', 4: 'D', 3: 'G', 2: 'B', 1: 'e'};
        const fingerColors = {
            1: '#4CAF50',
            2: '#2196F3',
            3: '#FF9800',
            4: '#F44336'
        };
        const thicknesses = [5, 4.2, 3.5, 3, 2.5, 2];

        function init() {
            const selT = document.getElementById('tonalidade');
            const selG = document.getElementById('grau');
            const btn = document.getElementById('gerar');

            tonalidades.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                selT.appendChild(opt);
            });

            graus.forEach(g => {
                const opt = document.createElement('option');
                opt.value = g;
                opt.textContent = g;
                selG.appendChild(opt);
            });

            function onChange() {
                btn.disabled = !(selT.value && selG.value);
                generateDiagram();
            }

            selT.addEventListener('change', onChange);
            selG.addEventListener('change', onChange);
            btn.addEventListener('click', generateDiagram);

            canvas = document.getElementById('chord-canvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            const w = Math.min(500, window.innerWidth * 0.9);
            const h = w * 0.75;
            canvas.width = w;
            canvas.height = h;
            if (currentChord) {
                draw();
            }
        }

        function generateDiagram() {
            const t = document.getElementById('tonalidade').value;
            const g = document.getElementById('grau').value;
            if (!t || !g) return;

            currentChord = dados.find(d => d.t === t && d.g === g);
            if (!currentChord) return;

            updateInfo();
            draw();
        }

        function updateInfo() {
            const info = document.getElementById('chord-info');
            info.innerHTML = `
                <h2>${currentChord.c}</h2>
                <p>${currentChord.tp}</p>
            `;
        }

        function draw() {
            if (!currentChord) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Wood background gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#8B4513');
            gradient.addColorStop(0.5, '#A0522D');
            gradient.addColorStop(1, '#5D4037');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const margin = 35;
            const strWidth = canvas.width - 2 * margin;
            const strX = new Array(6);
            for (let i = 0; i < 6; i++) {
                strX[i] = margin + (i / 5) * strWidth;
            }

            // Compute played strings and maxFret
            const playedStrings = [];
            let maxFret = 0;
            for (let i = 0; i < 6; i++) {
                const s = 6 - i;
                const c = currentChord[`c${s}`];
                if (c !== 99) {
                    playedStrings.push(i);
                    maxFret = Math.max(maxFret, c);
                }
            }
            const numVisibleFrets = Math.max(5, maxFret);

            const paddingTop = 50;
            const paddingBottom = 55;
            const diagramHeight = canvas.height - paddingTop - paddingBottom;
            const nutHeight = 12;
            const postNutHeight = diagramHeight - nutHeight;
            const fretSpacing = postNutHeight / numVisibleFrets;

            const nutTopY = paddingTop;
            const nutBotY = nutTopY + nutHeight;

            // Chord name and type
            ctx.fillStyle = 'white';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 4;
            ctx.fillText(`${currentChord.c} (${currentChord.t} ${currentChord.g})`, canvas.width / 2, 25);
            ctx.font = 'bold 18px Arial';
            ctx.shadowBlur = 2;
            ctx.fillText(currentChord.tp, canvas.width / 2, 55);
            ctx.shadowBlur = 0;

            // Nut
            ctx.fillStyle = '#3E2723';
            ctx.fillRect(margin - 10, nutTopY, canvas.width - 2 * margin + 20, nutHeight);

            // Frets
            ctx.strokeStyle = '#4A2C2A';
            ctx.lineWidth = 7;
            ctx.lineCap = 'round';
            for (let f = 1; f <= numVisibleFrets; f++) {
                const fy = nutBotY + f * fretSpacing;
                ctx.beginPath();
                ctx.moveTo(margin - 8, fy);
                ctx.lineTo(canvas.width - margin + 8, fy);
                ctx.stroke();
            }

            // Fret markers at 3 and 5
            ctx.fillStyle = '#000';
            const markerR = 4;
            for (let fm of [3, 5]) {
                if (fm > numVisibleFrets) break;
                const fmy = nutBotY + fm * fretSpacing;
                const leftX = margin + 0.3 * strWidth;
                const rightX = margin + 0.7 * strWidth;
                ctx.beginPath();
                ctx.arc(leftX, fmy, markerR, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(rightX, fmy, markerR, 0, Math.PI * 2);
                ctx.fill();
            }

            // Fret numbers and ref
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            if (currentChord.ref > 1) {
                ctx.fillText(`Ref. ${currentChord.ref}`, margin - 15, nutBotY - 15);
            }
            for (let f = 1; f <= numVisibleFrets; f++) {
                const fy = nutBotY + f * fretSpacing;
                ctx.fillText(f.toString(), margin - 15, fy);
            }

            // Strings (only played)
            ctx.strokeStyle = '#E0E0E0';
            ctx.lineCap = 'round';
            for (let pi = 0; pi < playedStrings.length; pi++) {
                const i = playedStrings[pi];
                const s = 6 - i;
                ctx.lineWidth = thicknesses[i];
                ctx.beginPath();
                ctx.moveTo(strX[i], nutBotY);
                ctx.lineTo(strX[i], canvas.height - paddingBottom + 10);
                ctx.stroke();
            }

            // Strumming numbers (gold, sequential for played)
            let strumNum = 1;
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            for (let i of playedStrings) {
                ctx.fillText(strumNum.toString(), strX[i], nutTopY - 8);
                strumNum++;
            }

            // Fingers and opens
            for (let pi = 0; pi < playedStrings.length; pi++) {
                const i = playedStrings[pi];
                const s = 6 - i;
                const c = currentChord[`c${s}`];
                const d = currentChord[`d${s}`];
                if (c === 0) {
                    // Open string
                    const oy = (nutTopY + nutBotY) / 2;
                    ctx.save();
                    ctx.fillStyle = 'white';
                    ctx.strokeStyle = 'black';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.arc(strX[i], oy, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = 'black';
                    ctx.font = 'bold 16px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('O', strX[i], oy);
                    ctx.restore();
                } else {
                    // Finger
                    const fy = nutBotY + c * fretSpacing;
                    const r = 10;
                    if (d >= 1 && d <= 4) {
                        ctx.fillStyle = fingerColors[d];
                        ctx.beginPath();
                        ctx.arc(strX[i], fy, r, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = 'white';
                        ctx.lineWidth = 3;
                        ctx.stroke();
                        ctx.fillStyle = 'white';
                        ctx.font = 'bold 18px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(d.toString(), strX[i], fy);
                    } else {
                        // Unknown finger, gray
                        ctx.fillStyle = '#666';
                        ctx.beginPath();
                        ctx.arc(strX[i], fy, r, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = 'black';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                }
            }

            // String labels below (only played)
            ctx.fillStyle = 'white';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            for (let i of playedStrings) {
                const s = 6 - i;
                const ly = canvas.height - 15;
                ctx.fillText(stringLabels[s], strX[i], ly);
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
