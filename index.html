        let chords = {};

        function getChordName(ton, grau, mod) {
            const degIdx = graus.indexOf(grau);
            if (degIdx === -1) return null;
            const base = noteIndices[ton];
            const steps = scaleSteps[mod];
            const qualList = qualities[mod];
            const offset = steps[degIdx];
            const rootIdx = (base + offset) % 12;
            const isSharpKey = sharpTonalities.includes(ton);
            const noteNames = isSharpKey ? sharpNoteNames : flatNoteNames;
            const root = noteNames[rootIdx];
            const qual = qualList[degIdx];
            return root + qual;
        }

        function generateDiagram() {
            const ton = document.getElementById('tonalidade').value;
            const grauSel = document.getElementById('grau').value;
            const mod = document.getElementById('modo').value;
            let displayName, pos, dig;

            if (mod === 'Maior') {
                const kd = ton + '-' + grauSel;
                const chord = chords[kd];
                if (chord) {
                    displayName = chord.name;
                    pos = chord.pos;
                    dig = chord.dig;
                } else {
                    displayName = 'Acorde não encontrado';
                    pos = null;
                }
            } else {
                const compName = getChordName(ton, grauSel, mod);
                displayName = compName;
                const fing = fingeringsByName[compName];
                if (fing) {
                    pos = fing.pos;
                    dig = fing.dig;
                } else {
                    displayName += ' - Consulte digitação';
                    pos = null;
                }
            }

            document.getElementById('chordName').textContent = displayName;
            currentPos = pos;
            currentDig = dig;
            const canvas = document.getElementById('fretboard');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (pos) {
                drawDiagram(ctx, pos, dig, canvas.width, canvas.height);
            }
        }

        function drawDiagram(ctx, pos, dig, w, h) {
            // Compute maxFret and played
            let maxFret = 0;
            for (let p of pos) {
                if (p > 0) maxFret = Math.max(maxFret, p);
            }
            const numFrets = Math.max(5, maxFret);
            const played = [];
            for (let i = 0; i < 6; i++) {
                if (pos[i] !== 99) played.push(i);
            }

            const baseW = 400;
            const scale = w / baseW;

            const marginL = 50 * scale;
            const marginR = 20 * scale;
            const marginT = 70 * scale;
            const marginB = 90 * scale;
            const fbW = w - marginL - marginR;
            const fbH = h - marginT - marginB;
            const space = fbH / numFrets;

            const yLines = [];
            for (let k = 0; k <= numFrets; k++) {
                yLines[k] = marginT + k * space;
            }

            const strGap = fbW / 5;
            const strX = [];
            for (let i = 0; i < 6; i++) {
                strX[i] = marginL + i * strGap;
            }

            // Wood gradient background
            const grad = ctx.createLinearGradient(0, 0, 0, h);
            grad.addColorStop(0, '#5D4037');
            grad.addColorStop(0.3, '#8D6E63');
            grad.addColorStop(0.7, '#A1887F');
            grad.addColorStop(1, '#D7CCC8');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Nut
            ctx.strokeStyle = 'rgba(0,0,0,0.9)';
            ctx.lineWidth = 6 * scale;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(marginL, yLines[0]);
            ctx.lineTo(marginL + fbW, yLines[0]);
            ctx.stroke();

            // Frets
            ctx.lineWidth = 3 * scale;
            for (let k = 1; k <= numFrets; k++) {
                ctx.beginPath();
                ctx.moveTo(marginL, yLines[k]);
                ctx.lineTo(marginL + fbW, yLines[k]);
                ctx.stroke();
            }

            // Strings (only played)
            ctx.strokeStyle = 'rgba(101,67,33,0.8)';
            for (let i = 0; i < 6; i++) {
                if (pos[i] !== 99) {
                    ctx.lineWidth = (4 - i * 0.4) * scale;
                    ctx.beginPath();
                    ctx.moveTo(strX[i], yLines[0]);
                    ctx.lineTo(strX[i], yLines[numFrets]);
                    ctx.stroke();
                }
            }

            // Fret numbers on left
            ctx.fillStyle = 'black';
            ctx.font = `bold ${16 * scale}px sans-serif`;
            ctx.textAlign = 'right';
            ctx.textBaseline = 'middle';
            for (let f = 1; f <= numFrets; f++) {
                ctx.fillText(f.toString(), marginL - 8 * scale, yLines[f]);
            }

            // Top indicators
            const yTop = marginT - 35 * scale;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let i = 0; i < 6; i++) {
                const cx = strX[i];
                const cy = yTop;
                if (pos[i] === 99) {
                    // ×
                    ctx.font = `bold ${28 * scale}px Arial`;
                    ctx.fillStyle = 'black';
                    ctx.fillText('×', cx, cy);
                } else {
                    // Strum seq circle
                    const seq = played.indexOf(i) + 1;
                    ctx.fillStyle = 'black';
                    ctx.beginPath();
                    ctx.arc(cx, cy, 14 * scale, 0, 2 * Math.PI);
                    ctx.fill();
                    // Number
                    ctx.fillStyle = 'white';
                    ctx.font = `bold ${20 * scale}px Arial`;
                    ctx.fillText(seq.toString(), cx, cy);
                }
            }

            // Open strings O
            ctx.font = `bold ${20 * scale}px Arial`;
            ctx.fillStyle = 'white';
            for (let i = 0; i < 6; i++) {
                if (pos[i] === 0) {
                    ctx.fillText('O', strX[i], yLines[0] + space * 0.5);
                }
            }

            // Finger positions
            for (let i = 0; i < 6; i++) {
                if (pos[i] > 0) {
                    const fy = yLines[pos[i]];
                    const fx = strX[i];
                    // Red circle
                    ctx.fillStyle = 'red';
                    ctx.beginPath();
                    ctx.arc(fx, fy, 12 * scale, 0, 2 * Math.PI);
                    ctx.fill();
                    // Finger number
                    if (dig[i] > 0) {
                        ctx.fillStyle = 'white';
                        ctx.font = `bold ${16 * scale}px Arial`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(dig[i].toString(), fx, fy);
                    }
                }
            }

            // Bottom string numbers / ×
            const yBot1 = yLines[numFrets] + 25 * scale;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `bold ${18 * scale}px Arial`;
            ctx.fillStyle = 'black';
            for (let i = 0; i < 6; i++) {
                const tx = strX[i];
                if (pos[i] === 99) {
                    ctx.fillText('×', tx, yBot1);
                } else {
                    const strN = 6 - i;
                    ctx.fillText(strN.toString(), tx, yBot1);
                }
            }

            // String letters (played only)
            const yBot2 = yBot1 + 25 * scale;
            ctx.font = `${16 * scale}px Arial`;
            for (let i = 0; i < 6; i++) {
                if (pos[i] !== 99) {
                    ctx.fillText(stringLetters[i], strX[i], yBot2);
                }
            }
        }

        function resizeCanvas() {
            const canvas = document.getElementById('fretboard');
            const maxW = Math.min(500, window.innerWidth * 0.9);
            const scaleFactor = maxW / 400;
            canvas.width = maxW;
            canvas.height = 450 * scaleFactor;
            if (currentPos) {
                drawDiagram(canvas.getContext('2d'), currentPos, currentDig, canvas.width, canvas.height);
            }
        }

        window.onload = function() {
            // Populate tonalidade
            const selTon = document.getElementById('tonalidade');
            tonalidades.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                selTon.appendChild(opt);
            });

            // Init chords
            chordList.forEach(c => {
                const kd = c.key + '-' + c.deg;
                chords[kd] = {
                    name: c.name,
                    pos: [...c.pos],
                    dig: [...c.dig]
                };
                if (!fingeringsByName[c.name]) {
                    fingeringsByName[c.name] = {
                        pos: [...c.pos],
                        dig: [...c.dig]
                    };
                }
            });

            // Events
            document.getElementById('gerar').onclick = generateDiagram;
            window.addEventListener('resize', resizeCanvas);

            // Default
            selTon.value = 'Dó';
            generateDiagram();
        };
    </script>
</body>
</html>
