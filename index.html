<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitar Chord Diagram App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #f0f0f0, #d0d0d0);
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 500px;
            width: 100%;
        }
        .control-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        label {
            font-weight: bold;
            min-width: 120px;
        }
        select, button {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
            flex: 1;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #45a049;
        }
        #chordCanvas {
            border: 2px solid #333;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            background: #fff;
        }
    </style>
</head>
<body>
    <h1>Guitar Chord Diagram App</h1>
    <div id="controls">
        <div class="control-row">
            <label for="modo">Campo Harmônico:</label>
            <select id="modo" onchange="updateTonalidades()">
                <option value="Maior">Maior</option>
                <option value="Menor">Menor</option>
            </select>
        </div>
        <div class="control-row">
            <label for="tonalidade">Tonalidade:</label>
            <select id="tonalidade"></select>
        </div>
        <div class="control-row">
            <label for="grau">Grau:</label>
            <select id="grau">
                <option value="I">I</option>
                <option value="II">II</option>
                <option value="III">III</option>
                <option value="IV">IV</option>
                <option value="V">V</option>
                <option value="VI">VI</option>
                <option value="VII">VII</option>
            </select>
        </div>
        <div class="control-row">
            <button onclick="gerar()">GERAR DIAGRAMA</button>
        </div>
    </div>
    <canvas id="chordCanvas" width="500" height="600"></canvas>

    <script>

        const ctx = canvas.getContext('2d');

            },
            'Fá': {
                'I': {name: 'F7M', pos: [1,3,3,2,1,1], dig: [1,3,4,2,1,1]},
                'II': {name: 'Gm7', pos: [3,5,5,3,3,3], dig: [1,3,4,1,1,1]},
                'III': {name: 'Am7', pos: [99,0,2,0,1,0], dig: [0,0,2,0,1,0]},

                'VII': {name: 'Em7(b5)', pos: [0,1,2,0,3,99], dig: [0,1,2,0,3,0]}
            },
            'Sib': {
                'I': {name: 'Bb7M', pos: [99,1,3,3,3,1], dig: [0,1,2,3,4,1]},
                'II': {name: 'Cm7', pos: [99,3,1,3,3,99], dig: [0,2,1,3,4,0]},
                'III': {name: 'Dm7', pos: [99,99,0,2,1,1], dig: [0,0,0,2,1,1]},

            },
            'Mib': {
                'I': {name: 'Eb7M', pos: [99,6,8,8,8,6], dig: [0,1,3,4,2,1]},
                'II': {name: 'Fm7', pos: [1,3,3,1,1,1], dig: [1,3,4,1,1,1]},
                'III': {name: 'Gm7', pos: [3,5,5,3,3,3], dig: [1,3,4,1,1,1]},
                'IV': {name: 'Ab7M', pos: [4,6,6,5,4,4], dig: [1,3,4,2,1,1]},
                'V': {name: 'Bb7', pos: [99,1,3,1,3,1], dig: [0,1,3,1,3,1]},
                'VI': {name: 'Cm7', pos: [99,3,1,3,3,99], dig: [0,2,1,3,4,0]},
                'VII': {name: 'Dm7(b5)', pos: [99,99,0,1,1,99], dig: [0,0,0,1,1,0]}
            },
            'Láb': {
                'I': {name: 'Ab7M', pos: [4,6,6,5,4,4], dig: [1,3,4,2,1,1]},
                'II': {name: 'Bbm7', pos: [99,6,8,8,6,6], dig: [0,1,3,4,2,1]},
                'III': {name: 'Cm7', pos: [99,3,1,3,3,99], dig: [0,2,1,3,4,0]},
                'IV': {name: 'Db7M', pos: [99,4,6,6,6,4], dig: [0,1,3,4,2,1]},
                'V': {name: 'Eb7', pos: [99,6,8,8,6,6], dig: [0,1,3,4,2,1]},
                'VI': {name: 'Fm7', pos: [1,3,3,1,1,1], dig: [1,3,4,1,1,1]},
                'VII': {name: 'Gm7(b5)', pos: [3,99,3,4,4,99], dig: [1,0,1,2,3,0]}
            }
        };

        function updateTonalidades() {
            const modo = document.getElementById('modo').value;
            const sel = document.getElementById('tonalidade');
            sel.innerHTML = '';
            const keys = modo === 'Maior' ? tonalidadesMaior : tonalidadesMenor;
            keys.forEach(k => {
                const opt = document.createElement('option');
                opt.value = k;
                opt.textContent = k;
                sel.appendChild(opt);
            });
        }

        function findBarres(pos, dig) {
            const barres = [];
            for (let f = 1; f <= 12; f++) {
                for (let finger = 1; finger <= 4; finger++) {
                    const barredStrings = [];
                    for (let i = 0; i < 6; i++) {
                        if (pos[i] === f && dig[i] === finger) {
                            barredStrings.push(i);
                        }
                    }
                    if (barredStrings.length >= 2) {
                        barres.push({fret: f, finger, strings: barredStrings});
                    }
                }
            }
            return barres;
        }

        function gerar() {
            const tonalidade = document.getElementById('tonalidade').value;
            const grau = document.getElementById('grau').value;
            const chord = chords[tonalidade]?.[grau];
            if (!chord) {
                alert('Chord not found!');
                return;
            }
            drawDiagram(chord);
        }

        function drawDiagram(chord) {
            // Constants
            const marginLeft = 70;
            const topY = 140;
            const stringStartX = marginLeft + 25;
            const stringSpacing = 52;
            const stringXs = [];
            for (let i = 0; i < 6; i++) {
                stringXs[i] = stringStartX + i * stringSpacing;
            }
            const fretSpace = 65;
            const numFretLines = 6;
            const lineYs = [];
            for (let k = 0; k < numFretLines; k++) {
                lineYs[k] = topY + k * fretSpace;
            }

            // Compute fretStart
            let maxFret = 0;
            for (let p of chord.pos) {
                if (p > 0 && p !== 99) maxFret = Math.max(maxFret, p);
            }
            let fretStart = Math.max(0, maxFret - 3);

            // Strum numbers
            const strumNums = new Array(6).fill(0);
            let strumCount = 1;
            for (let i = 0; i < 6; i++) {
                if (chord.pos[i] !== 99) {
                    strumNums[i] = strumCount++;
                }
            }

            // Barres
            const barres = findBarres(chord.pos, chord.dig);

            // Clear
            ctx.clearRect(0, 0, 500, 600);

            // Wood gradient background
            const grad = ctx.createLinearGradient(0, 0, 0, 600);
            grad.addColorStop(0, '#D2B48C');
            grad.addColorStop(0.5, '#DEB887');
            grad.addColorStop(1, '#A0522D');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 500, 600);

            // Fretboard outline
            ctx.strokeStyle = 'rgba(0,0,0,0.4)';
            ctx.lineWidth = 3;
            ctx.strokeRect(marginLeft - 15, topY - 15, stringXs[5] - stringXs[0] + 40, 5 * fretSpace + 30);

            // Chord name
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = 'bold 32px Arial';
            ctx.fillStyle = '#333';
            ctx.fillText(chord.name, 250, topY - 50);

            // Fret numbers
            ctx.textAlign = 'right';
            ctx.font = 'bold 20px Arial';
            ctx.fillStyle = '#555';
            for (let k = 0; k < numFretLines; k++) {
                const num = fretStart + k;
                if (num === 0) continue;
                ctx.fillText(num.toString(), marginLeft, lineYs[k]);
            }

            // String labels (bottom)
            ctx.textBaseline = 'top';
            ctx.font = 'bold 22px Arial';
            const bottomY = topY + 5 * fretSpace + 15;
            for (let i = 0; i < 6; i++) {
                ctx.textAlign = 'center';
                ctx.fillText((6 - i).toString(), stringXs[i], bottomY);
            }

            // Horizontal fret lines
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#444';
            if (fretStart === 0) {
                ctx.lineWidth = 14;
                ctx.beginPath();
                ctx.moveTo(stringXs[0] - 25, lineYs[0]);
                ctx.lineTo(stringXs[5] + 25, lineYs[0]);
                ctx.stroke();
            }
            ctx.lineWidth = 4;
            for (let k = 1; k < numFretLines; k++) {
                ctx.beginPath();
                ctx.moveTo(stringXs[0] - 15, lineYs[k]);
                ctx.lineTo(stringXs[5] + 15, lineYs[k]);
                ctx.stroke();
            }

            // Barre indicators (before strings)
            ctx.strokeStyle = 'rgba(0,0,0,0.85)';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            for (let barre of barres) {
                const relFret = barre.fret - fretStart;
                let barreY = topY + Math.max(0.5, Math.min(4.5, relFret)) * fretSpace;
                const minStr = Math.min(...barre.strings);
                const maxStr = Math.max(...barre.strings);
                const numBarred = maxStr - minStr + 1;
                const spanW = numBarred * stringSpacing * 0.7;
                const startX = stringXs[minStr] - stringSpacing * 0.5 - 15;
                const midX = startX + spanW / 2;
                const endX = startX + spanW;
                ctx.beginPath();
                ctx.moveTo(startX, barreY);
                ctx.quadraticCurveTo(midX, barreY - 15, endX, barreY);
                ctx.stroke();
                // Finger text
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.font = 'bold 20px Arial';
                ctx.fillStyle = 'rgba(0,0,0,0.9)';
                ctx.fillText(barre.finger.toString(), midX, barreY - 22);
            }

            // Vertical strings (on top)
            for (let i = 0; i < 6; i++) {
                const lw = 1.8 + (5 - i) * 0.5; // thicker on bass (left)
                ctx.lineWidth = lw;
                ctx.strokeStyle = '#222';
                ctx.beginPath();
                ctx.moveTo(stringXs[i], topY - 10);
                ctx.lineTo(stringXs[i], topY + 5 * fretSpace + 10);
                ctx.stroke();
            }

            // Open circles and mutes
            const openY = topY - 25;
            const muteY = topY - 18;
            for (let i = 0; i < 6; i++) {
                const p = chord.pos[i];
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                if (p === 99) { // muted
                    ctx.font = 'bold 28px Arial';
                    ctx.fillStyle = '#CC0000';
                    ctx.fillText('×', stringXs[i], muteY);
                } else if (p === 0) { // open
                    const r = 7;
                    ctx.fillStyle = '#DDD';
                    ctx.beginPath();
                    ctx.arc(stringXs[i], openY, r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(stringXs[i], openY, r * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Strum sequence numbers
            ctx.textBaseline = 'bottom';
            ctx.font = 'bold 24px Arial';
            ctx.fillStyle = '#0066CC';
            for (let i = 0; i < 6; i++) {
                if (strumNums[i] > 0) {
                    ctx.textAlign = 'center';
                    ctx.fillText(strumNums[i].toString(), stringXs[i], openY - 12);
                }
            }

            // Finger dots and numbers
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let i = 0; i < 6; i++) {
                const p = chord.pos[i];
                if (p === 99 || p === 0) continue;
                const rel = p - fretStart;
                const dotY = topY + Math.max(0.4, Math.min(4.6, rel)) * fretSpace;
                // Dot
                ctx.fillStyle = '#F0F0F0';
                ctx.beginPath();
                ctx.arc(stringXs[i], dotY, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2.5;
                ctx.stroke();
                // Finger number
                const d = chord.dig[i];
                ctx.fillStyle = '#222';
                ctx.font = 'bold 20px Arial';
                ctx.fillText(d.toString(), stringXs[i], dotY);
            }
        }

        // Init
        updateTonalidades();
        gerar(); // draw default
    </script>
</body>
</html>
