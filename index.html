    let currentChord = null;

    function resizeCanvas() {
      const canvas = document.getElementById('fretboard');
      const maxW = Math.min(520, window.innerWidth * 0.88);
      const size = Math.min(maxW, window.innerHeight * 0.45);
      canvas.width = size;
      canvas.height = size * 1.35;
      canvas.style.width = size + 'px';
      canvas.style.height = (size * 1.35) + 'px';
      if (currentChord) {
        drawFretboard(currentChord);
      }
    }

    function drawFretboard(chord) {
      const canvas = document.getElementById('fretboard');
      const ctx = canvas.getContext('2d');
      const W = canvas.width;
      const H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      // Background gradient
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#2c1810');
      grad.addColorStop(0.5, '#1a0f08');
      grad.addColorStop(1, '#2c1810');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      const marginX = 0.08 * W;
      const marginY = 0.1 * H;
      const fbW = W * 0.84;
      const fbH = H * 0.7;
      const fbX = marginX;
      const fbY = marginY;
      const nutY = fbY + 0.06 * fbH;
      const fretSpan = fbH * 0.88;
      const cellH = fretSpan / 12;
      const strLeft = fbX + 0.06 * fbW;
      const strRight = fbX + 0.94 * fbW;
      const strSpace = (strRight - strLeft) / 5;
      const strX = [];
      for (let s = 0; s < 6; s++) {
        strX[s] = strLeft + strSpace * s;
      }

      // Frets
      ctx.strokeStyle = '#d4a76a';
      ctx.lineCap = 'round';
      // Nut
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.moveTo(fbX, nutY);
      ctx.lineTo(fbX + fbW, nutY);
      ctx.stroke();
      // Frets 1-12
      ctx.lineWidth = 2.2;
      for (let f = 1; f <= 12; f++) {
        const y = nutY + cellH * f;
        ctx.beginPath();
        ctx.moveTo(fbX, y);
        ctx.lineTo(fbX + fbW, y);
        ctx.stroke();
      }

      // Strings
      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = 1.8;
      for (let s = 0; s < 6; s++) {
        ctx.beginPath();
        ctx.moveTo(strX[s], nutY);
        ctx.lineTo(strX[s], nutY + 12 * cellH);
        ctx.stroke();
      }

      // Fret markers
      const dotR = cellH * 0.12;
      const markerFrets = [3,5,7,9,12];
      for (let f of markerFrets) {
        const y = nutY + cellH * f;
        ctx.fillStyle = '#d4a76a';
        ctx.beginPath();
        ctx.arc(fbX + fbW * 0.3, y, dotR, 0, 2 * Math.PI);
        ctx.arc(fbX + fbW * 0.7, y, dotR, 0, 2 * Math.PI);
        ctx.fill();
      }
      // 12th double
      const y12 = nutY + 12 * cellH;
      ctx.beginPath();
      ctx.arc(strX[1], y12, dotR, 0, 2 * Math.PI);
      ctx.arc(strX[3], y12, dotR, 0, 2 * Math.PI);
      ctx.fill();

      // Nut indicators
      const nutIconH = cellH * 0.8;
      const iconW = nutIconH;
      for (let s = 0; s < 6; s++) {
        const fretPos = chord[`c${6 - s}`];
        const x = strX[s];
        const ytop = nutY - nutIconH * 0.6;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        if (fretPos === 99) {
          ctx.fillStyle = '#ff4444';
          ctx.fillRect(x - iconW / 2, ytop, iconW, nutIconH);
          ctx.fillStyle = '#fff';
          ctx.font = `bold ${nutIconH * 0.7}px Arial`;
          ctx.fillText('X', x, ytop + nutIconH / 2);
        } else if (fretPos === 0) {
          ctx.fillStyle = '#888';
          ctx.beginPath();
          ctx.arc(x, ytop + nutIconH / 2, nutIconH * 0.4, 0, 2 * Math.PI);
          ctx.fill();
          ctx.strokeStyle = '#666';
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.fillStyle = '#fff';
          ctx.font = `bold ${nutIconH * 0.6}px Arial`;
          ctx.fillText('O', x, ytop + nutIconH / 2);
        }
      }

      // Finger positions
      const fingerColors = [null, '#4CAF50', '#2196F3', '#FF9800', '#F44336'];
      const fingerRad = cellH * 0.32;
      for (let s = 0; s < 6; s++) {
        const fret = chord[`c${6 - s}`];
        const finger = chord[`d${6 - s}`];
        if (fret > 0 && fret <= 12 && finger >= 1 && finger <= 4) {
          const y = nutY + cellH * fret;
          const x = strX[s];
          ctx.fillStyle = fingerColors[finger];
          ctx.beginPath();
          ctx.arc(x, y, fingerRad, 0, 2 * Math.PI);
          ctx.fill();
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2.5;
          ctx.stroke();
          ctx.fillStyle = '#fff';
          ctx.font = `bold ${fingerRad * 1.6}px Arial`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(finger.toString(), x, y);
        }
      }

      // Strumming
      const strumY = nutY - cellH * 0.8;
      ctx.fillStyle = '#000';
      ctx.font = `bold ${cellH * 0.5}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let s = 0; s < 6; s++) {
        const seq = chord[`d${6 - s}`];
        if (seq > 0) {
          const x = strX[s];
          // Bullet
          ctx.beginPath();
          ctx.arc(x, strumY - cellH * 0.15, cellH * 0.22, 0, 2 * Math.PI);
          ctx.fill();
          // Number
          ctx.fillStyle = '#fff';
          ctx.font = `bold ${cellH * 0.45}px Arial`;
          ctx.fillText(seq.toString(), x, strumY + cellH * 0.08);
        }
      }

      // Fret numbers
      ctx.fillStyle = '#d4a76a';
      ctx.font = `bold ${cellH * 0.45}px monospace`;
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      const numX = fbX - marginX * 0.5;
      for (let f = 1; f <= 12; f++) {
        const y = nutY + cellH * f;
        ctx.fillText(f.toString(), numX, y);
      }

      // Reference fret
      ctx.font = `bold ${cellH * 0.5}px sans-serif`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(`Ref: ${chord.ref}`, numX - cellH * 1.2, nutY - cellH * 0.8);

      // String labels
      const labelY = nutY + 12 * cellH + cellH * 0.6;
      ctx.fillStyle = '#e0e0e0';
      ctx.font = `bold italic ${cellH * 0.55}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const labels = ['E', 'A', 'D', 'G', 'B', 'e'];
      for (let s = 0; s < 6; s++) {
        ctx.fillText(labels[s], strX[s], labelY);
      }
    }

    // Init
    window.addEventListener('load', () => {
      resizeCanvas();

      const tsel = document.getElementById('tonalidade');
      const gsel = document.getElementById('grau');
      const btn = document.getElementById('gerar');
      const info = document.getElementById('chord-info');
      const legend = document.getElementById('legend');
      const strLabel = document.querySelector('.strings-label');

      // Populate tonalidades
      const tonals = [...new Set(dados.map(d => d.t))].sort((a,b) => a.localeCompare(b));
      tonals.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        tsel.appendChild(opt);
      });

      // Graus
      const graus = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII'];
      graus.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g;
        opt.textContent = g;
        gsel.appendChild(opt);
      });

      function updateBtn() {
        btn.disabled = !tsel.value || !gsel.value;
      }
      tsel.addEventListener('change', updateBtn);
      gsel.addEventListener('change', updateBtn);

      btn.addEventListener('click', () => {
        const chord = dados.find(d => d.t === tsel.value && d.g === gsel.value);
        if (chord) {
          currentChord = chord;
          document.getElementById('chord-name').textContent = chord.c;
          document.getElementById('chord-type').textContent = chord.tp;
          info.style.display = 'block';
          legend.style.display = 'block';
          strLabel.style.display = 'block';
          drawFretboard(chord);
        }
      });

      window.addEventListener('resize', resizeCanvas);
    });

    // PWA Service Worker
    if ('serviceWorker' in navigator) {
      const swCode = `
        self.addEventListener('install', e => {
          e.waitUntil(
            caches.open('guitar-chords-v1').then(cache => {
              return cache.add(window.location.href);
            })
          );
        });
        self.addEventListener('fetch', e => {
          e.respondWith(
            caches.match(e.request).then(response => {
              return response || fetch(e.request);
            })
          );
        });
      `;
      navigator.serviceWorker.register(URL.createObjectURL(new Blob([swCode], {type: 'application/javascript'})))
        .catch(err => console.log('SW failed:', err));
    }
  </script>
